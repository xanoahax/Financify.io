name: Release Tauri Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
      release_body: ${{ steps.release_notes.outputs.release_body }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}") {
            $tag = "${{ github.ref_name }}"
          } else {
            $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
            $tag = "v$version"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Resolve release changelog
        id: release_notes
        shell: pwsh
        run: |
          if (-not (Test-Path "CHANGELOG.md")) {
            throw "CHANGELOG.md not found. Please add a changelog entry before releasing."
          }

          $tag = "${{ steps.release_tag.outputs.tag }}"
          $version = $tag.TrimStart("v")
          $escapedVersion = [regex]::Escape($version)
          $content = Get-Content "CHANGELOG.md" -Raw
          $pattern = "(?ms)^##\s+\[?v?$escapedVersion\]?[^\r\n]*\r?\n(?<body>.*?)(?=^##\s+|\z)"
          $match = [regex]::Match($content, $pattern)

          if (-not $match.Success) {
            throw "No changelog section found for $tag in CHANGELOG.md."
          }

          $body = $match.Groups["body"].Value.Trim()
          if ([string]::IsNullOrWhiteSpace($body)) {
            throw "Changelog section for $tag is empty."
          }

          $releaseBody = "## Changelog`n$body"
          "release_body<<EOF" >> $env:GITHUB_OUTPUT
          $releaseBody >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

  build_release:
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            args: ""
            rust_target: ""
          - runner: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
          - runner: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare_release.outputs.tag }}
          releaseName: financify.io ${{ needs.prepare_release.outputs.tag }}
          releaseBody: ${{ needs.prepare_release.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish_release:
    needs:
      - prepare_release
      - build_release
    runs-on: windows-latest

    steps:
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.prepare_release.outputs.tag }}" --draft=false --latest
